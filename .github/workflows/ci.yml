name: Node.js CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js 18.x
        uses: actions/setup-node@v3
        with:
          node-version: 18.x

      - name: Install Dependencies
        working-directory: ./Backend/src
        run: npm install

      - name: Run Tests
        working-directory: ./Backend/src
        run: npm run test

      - name: Install Frontend Dependencies
        working-directory: ./Frontend
        run: npm install

      - name: Lint Frontend
        working-directory: ./Frontend
        run: npm run lint

      - name: Build Frontend (Verify JSX)
        working-directory: ./Frontend
        run: npm run build
