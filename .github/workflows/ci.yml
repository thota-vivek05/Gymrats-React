name: Node.js CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
      redis:
        image: redis:latest
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 18.x
        uses: actions/setup-node@v4
        with:
          node-version: 18.x

      - name: Install Dependencies
        working-directory: ./Backend/src
        run: npm install

      - name: Run Tests
        working-directory: ./Backend/src
        run: npm run test
        env:
          MONGO_URI: mongodb://127.0.0.1:27017/gymrats
          REDIS_URL: redis://127.0.0.1:6379

      - name: Install Frontend Dependencies
        working-directory: ./Frontend
        run: npm install

      - name: Lint Frontend
        working-directory: ./Frontend
        run: npm run lint || true

      - name: Build Frontend (Verify JSX)
        working-directory: ./Frontend
        run: npm run build
